optimizer:
  type: bayesian
  budget: 40
parameters:
  - name: temperature
    type: float
    low: 0.0
    high: 1.5
    step: 0.2
  - name: top_k
    type: int
    low: 10
    high: 100
    step: 10
  - name: top_p
    type: float
    low: 0.1
    high: 1.0
    step: 0.1
  - name: min_p
    type: float
    low: 0.0
    high: 0.2
    step: 0.05
  - name: repeat_penalty
    type: float
    low: 1.0
    high: 1.2
    step: 0.1
  - name: frequency_penalty
    type: float
    low: 0.0
    high: 1.0
    step: 0.5
  - name: presence_penalty
    type: float
    low: 0.0
    high: 1.0
    step: 0.5
static_params:
  chat_template_kwargs:
    enable_thinking: false
tests:
  - id: creative
    prompt: |
      You are a creative writing assistant. Write a short, evocative two-sentence poem about a quiet winter morning. Return only the poem, with no explanation.
    max_tokens: 2048
    repeat: 5
    reasoning: false
  - id: reasoning
    prompt: |
      You are a math tutor. A train leaves at 2:00 PM traveling 60 mph. Another leaves the same station at 3:00 PM on a parallel track traveling 90 mph. At what time does the second train catch the first? Show your reasoning step by step, then state the final answer clearly.
    max_tokens: 2048
    repeat: 5
    reasoning: true
  - id: factual
    prompt: |
      You are a concise technical writer. In three bullet points, summarize the main differences between TCP and UDP. Do not include any extra commentary.
    max_tokens: 2048
    repeat: 5
    reasoning: false
