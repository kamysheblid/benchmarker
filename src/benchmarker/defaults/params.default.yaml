optimizer:
  type: bayesian
  budget: 16
parameters:
  - name: temperature
    type: float
    low: 0.2
    high: 1.2
    step: 0.1
  - name: top_k
    type: int
    low: 10
    high: 60
    step: 10
  - name: top_p
    type: float
    low: 0.8
    high: 1.0
    step: 0.05
  - name: min_p
    type: float
    low: 0.0
    high: 0.2
    step: 0.05
  - name: repeat_penalty
    type: float
    low: 1.0
    high: 1.3
    step: 0.05
