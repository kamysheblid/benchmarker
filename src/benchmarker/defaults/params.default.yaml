optimizer:
  type: bayesian
  budget: 16
parameters:
  - name: temperature
    type: float
    low: 0.2
    high: 1.2
    step: 0.1
  - name: top_k
    type: int
    low: 10
    high: 60
    step: 10
  - name: top_p
    type: float
    low: 0.8
    high: 1.0
    step: 0.05
  - name: min_p
    type: float
    low: 0.0
    high: 0.2
    step: 0.05
  - name: repeat_penalty
    type: float
    low: 1.0
    high: 1.3
    step: 0.05
# Reasoning models (e.g. Qwen3) spend the whole token budget on a thinking
# trace and return an empty answer. Disable thinking so the budget goes to the
# actual response. Harmless for non-reasoning models.
static_params:
  chat_template_kwargs:
    enable_thinking: false
