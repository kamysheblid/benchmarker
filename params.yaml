optimizer:
  budget: 40
  type: bayesian
parameters:
- name: temperature
  type: float
  low: 0.0
  high: 2.0
  step: 2.4
- name: top_k
  type: int
  low: 1
  high: 100
  step: 80
- name: top_p
  type: float
  low: 0.0
  high: 1.0
  step: 1.6
- name: repeat_penalty
  type: float
  low: 1.0
  high: 2.0
  step: 0.8
- name: frequency_penalty
  type: float
  low: 0.0
  high: 1.0
  step: 2.0
- name: presence_penalty
  type: float
  high: 1.0
  low: 0.0
  step: 2.0
  choices:
  - 0.0
  - 0.5
  - 1.0
- name: min_p
  high: 0.2
  low: 0.0
  step: 0.2
  type: float
static_params:
  chat_template_kwargs:
    enable_thinking: false
